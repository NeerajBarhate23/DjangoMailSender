<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent Successfully</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        @keyframes checkmark {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-checkmark { animation: checkmark 0.6s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl p-10 max-w-sm w-full text-center">

        <!-- Animated Checkmark -->
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-500/20 border border-green-500/30 mb-6 animate-checkmark">
            <svg class="h-10 w-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-bold text-white mb-2">Success!</h2>
        <p class="text-indigo-300 mb-8">Your email has been sent and logged successfully.</p>

        <div class="flex flex-col gap-3">
            <a href="{% url 'advanced_send_email' %}" class="inline-flex justify-center items-center w-full px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-indigo-500 to-purple-500 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Send Another Email
            </a>
            <a href="{% url 'advanced_history' %}" class="inline-flex justify-center items-center w-full px-6 py-3 rounded-xl text-sm font-semibold text-indigo-300 border border-indigo-500/30 hover:bg-indigo-500/10 transition-all duration-200">
                📋 View Sent History
            </a>
        </div>
    </div>
</body>
</html>
