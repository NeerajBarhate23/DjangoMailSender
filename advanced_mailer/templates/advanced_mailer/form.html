<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Mail Sender</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25);
            outline: none;
        }
        .input-field::placeholder { color: #94a3b8; }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        .file-input::-webkit-file-upload-button {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 12px;
        }
        select option { background: #1e1b4b; color: #e2e8f0; }
    </style>
</head>
<body class="flex items-center justify-center py-8 px-4">
    <div class="max-w-2xl w-full glass-card p-8 md:p-10 rounded-3xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white tracking-tight">
                ✉️ Advanced Mail Sender
            </h2>
            <p class="mt-2 text-sm text-indigo-300">
                Attachments · CC/BCC · Templates · History · PRG Pattern
            </p>
            <a href="{% url 'advanced_history' %}" class="inline-block mt-3 text-xs font-medium text-indigo-400 hover:text-indigo-300 transition underline underline-offset-4">
                📋 View Sent History
            </a>
        </div>

        <!-- Error Messages -->
        {% if messages %}
            <div class="rounded-xl bg-red-500/20 border border-red-500/30 p-4 mb-6">
                <ul class="text-sm text-red-300 list-disc pl-4 space-y-1">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <form class="space-y-5" action="{% url 'advanced_send_email' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Template Selector -->
            <div>
                <label for="template-select" class="block text-sm font-medium text-indigo-200 mb-1.5">📝 Load Template</label>
                <select name="template" id="template-select" class="input-field w-full rounded-xl px-4 py-3 text-sm">
                    <option value="">-- Select a template (optional) --</option>
                    {% for t in templates %}
                        <option value="{{ t.id }}" data-subject="{{ t.subject }}" data-message="{{ t.message_html|escapejs }}">{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Recipient -->
            <div>
                <label for="id_to" class="block text-sm font-medium text-indigo-200 mb-1.5">📧 Recipient Email</label>
                <input type="email" name="to" id="id_to" required
                    class="input-field w-full rounded-xl px-4 py-3 text-sm"
                    placeholder="recipient@example.com">
            </div>

            <!-- CC and BCC side by side -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="id_cc" class="block text-sm font-medium text-indigo-200 mb-1.5">📋 CC</label>
                    <input type="text" name="cc" id="id_cc"
                        class="input-field w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="cc1@example.com, cc2@example.com">
                </div>
                <div>
                    <label for="id_bcc" class="block text-sm font-medium text-indigo-200 mb-1.5">🔒 BCC</label>
                    <input type="text" name="bcc" id="id_bcc"
                        class="input-field w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="bcc1@example.com, bcc2@example.com">
                </div>
            </div>

            <!-- Subject -->
            <div>
                <label for="subject-input" class="block text-sm font-medium text-indigo-200 mb-1.5">📌 Subject</label>
                <input type="text" name="subject" id="subject-input" required
                    class="input-field w-full rounded-xl px-4 py-3 text-sm"
                    placeholder="Enter email subject">
            </div>

            <!-- Message -->
            <div>
                <label for="message-editor" class="block text-sm font-medium text-indigo-200 mb-1.5">💬 Message</label>
                <textarea name="message" id="message-editor" rows="8"
                    class="input-field w-full rounded-xl px-4 py-3 text-sm"
                    placeholder="Enter your message here..."></textarea>
            </div>

            <!-- File Attachment -->
            <div>
                <label for="id_attachment" class="block text-sm font-medium text-indigo-200 mb-1.5">📎 Attachment</label>
                <input type="file" name="attachment" id="id_attachment"
                    class="input-field file-input w-full rounded-xl px-4 py-3 text-sm cursor-pointer">
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="btn-primary w-full flex justify-center items-center py-3.5 px-6 rounded-xl text-white font-semibold text-sm shadow-lg">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
                Send Email
            </button>
        </form>
    </div>

    <script>
        // Template Auto-Fill Logic
        document.getElementById('template-select').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            if (this.value) {
                const subject = selected.getAttribute('data-subject');
                const messageHtml = selected.getAttribute('data-message');

                // Fill the subject field
                document.getElementById('subject-input').value = subject;

                // Fill the message textarea
                document.getElementById('message-editor').value = messageHtml;
            }
        });
    </script>
</body>
</html>
